<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перспектива</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <header class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-[150px] h-[30px] flex items-center justify-center">
                <img src="./src/img/Group 4194.png" alt="" class="max-w-full max-h-full object-contain">
            </div>
        </div>

        <div class="flex items-center gap-4">
            <a href="#" class="px-6 py-2 border border-gray-400 rounded-full text-xs font-semibold tracking-widest text-gray-800 uppercase hover:bg-gray-100 transition-colors">
                Связаться
            </a>
            <button class="w-10 h-10 bg-[#229764] rounded-full flex flex-col items-center justify-center gap-1 hover:bg-[#1b7a50] transition-colors">
                <span class="w-4 h-0.5 bg-white rounded-full"></span>
                <span class="w-4 h-0.5 bg-white rounded-full"></span>
                <span class="w-4 h-0.5 bg-white rounded-full"></span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 mb-12">
        <section class="relative rounded-[2.5rem] overflow-hidden bg-gray-900 min-h-[520px] flex flex-col justify-between p-8 sm:p-16 shadow-lg">
            <div class="absolute inset-0 w-full h-full">
                <img src="./src/img/Rectangle 5 (7).png" alt="" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-black/20"></div>
            </div>

            <div class="relative z-10 my-auto max-w-3xl">
                <h1 class="text-white text-3xl sm:text-5xl font-black uppercase tracking-wide leading-tight">
                    Фонд развития<br>социальных проектов<br>
                    <span class="text-[#229764]">«Перспектива»</span>
                </h1>
            </div>

            <div class="relative z-10 flex justify-center items-center gap-2 mt-4">
                <span class="w-2.5 h-2.5 rounded-full bg-[#229764] cursor-pointer"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-white/60 hover:bg-white cursor-pointer transition-colors"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-white/60 hover:bg-white cursor-pointer transition-colors"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-white/60 hover:bg-white cursor-pointer transition-colors"></span>
            </div>
        </section>
    </main>

</body>
</html>
